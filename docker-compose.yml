services:
  mysql:
    image: mysql:8.0
    container_name: temple-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: temple
      MYSQL_USER: temple
      MYSQL_PASSWORD: temple
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
